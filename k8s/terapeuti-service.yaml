apiVersion: v1
kind: Service
metadata:
  name: terapeuti-service
spec:
  ports:
    - port: 8084
      targetPort: 8084
  selector:
    app: terapeuti-service
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terapeuti-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terapeuti-service
  template:
    metadata:
      labels:
        app: terapeuti-service
    spec:
      containers:
        - name: terapeuti-service
          image: kinetocare/terapeuti-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kinetocare-config
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kinetocare-secrets
                  key: MYSQL_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m"
          ports:
            - containerPort: 8084
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "384Mi"
