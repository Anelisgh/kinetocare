apiVersion: v1
kind: PersistentVolumeClaim # Tipul: PVC (cere un spațiu pe disc de la k8s)
metadata:
  name: keycloak-pvc # Persistența datelor Keycloak (realm-uri, utilizatori)
  namespace: kinetocare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: kinetocare
spec:
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080 # Accesează panoul de administrare Keycloak la localhost:30080
  selector:
    app: keycloak
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: kinetocare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3.4
          args: ["start-dev", "--import-realm"] # Pornire în modul development + importare realm automat
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data # Datele persistente ale Keycloak
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import/kinetocare-realm.json
              subPath: kinetocare-realm.json # Importă configul realm-ului din ConfigMap
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "768Mi"
      volumes: # Definirea surselor de date
        - name: keycloak-data
          persistentVolumeClaim:
            claimName: keycloak-pvc
        - name: keycloak-realm
          configMap:
            name: keycloak-realm-config # Configul realm-ului stocat în ConfigMap
