spring.application.name=programari-service
server.port=8085

# mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/programari_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=update

# logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.programari_service=DEBUG

app.service-names.initial=Evaluare Initiala
app.service-names.recurring=Reevaluare

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs

# rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# external services
application.urls.user-service=${USER_SERVICE_URL:http://localhost:8082}
application.urls.pacienti-service=${PACIENTI_SERVICE_URL:http://localhost:8083}
application.urls.terapeuti-service=${TERAPEUTI_SERVICE_URL:http://localhost:8084}
application.urls.servicii-service=${SERVICII_SERVICE_URL:http://localhost:8086}

# cache -> se schimba la 10min
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=10m