spring.application.name=terapeuti-service
server.port=8084

# mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/terapeuti_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=update

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs

# logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.terapeuti_service=DEBUG

server.tomcat.max-http-form-post-size=10MB