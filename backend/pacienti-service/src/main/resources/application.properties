# Dezactivam restartul automat DevTools pentru a evita conflictele cu MapStruct (erori de tip Bean Not Found la pornire)
spring.devtools.restart.enabled=false
spring.application.name=pacienti-service
server.port=8083

# mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/pacienti_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=update

# logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.pacienti_service=DEBUG

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs

# rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# external services
application.urls.programari-service=${PROGRAMARI_SERVICE_URL:http://localhost:8085}

# Aliniere nivel izolare tranzactii cu teza
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
