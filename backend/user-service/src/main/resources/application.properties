spring.application.name=user-service
server.port=8082

# DevTools: dezactivam restart automat (cauza erorii "No qualifying bean of type UserRepository")
# MapStruct genereaza clasele in target/ iar DevTools facea restart inainte de finalizare
spring.devtools.restart.enabled=false

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/user_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs
# url-ul serverului keycloak
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:8080}
keycloak.realm=kinetocare
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=admin-cli
# realm-ul unde se autentifica adminul
keycloak.admin.realm=master
# configurare admin
app.admin.email=admin@kinetocare.com
app.admin.password=admin123
app.admin.first-name=Kinetocare
app.admin.last-name=Admin
app.admin.phone=0700000000
app.keycloak.admin-role=admin

# logging
logging.level.root=INFO
logging.level.com.example.user_service=DEBUG
# pentru create
pacienti.service.url=${PACIENTI_SERVICE_URL:http://localhost:8083}
terapeuti.service.url=${TERAPEUTI_SERVICE_URL:http://localhost:8084}
programari.service.url=${PROGRAMARI_SERVICE_URL:http://localhost:8085}

server.tomcat.max-http-form-post-size=10MB