springdoc.api-docs.path=/servicii/v3/api-docs
# Dezactivam restartul automat DevTools pentru a evita conflictele cu MapStruct (erori de tip Bean Not Found la pornire)
spring.devtools.restart.enabled=false
spring.application.name=servicii-service
server.port=8086

# mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/servicii_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=validate

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs

# logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.servicii_service=DEBUG



# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Feign Tracing
spring.cloud.openfeign.micrometer.enabled=true



