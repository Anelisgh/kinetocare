springdoc.api-docs.path=/notificari/v3/api-docs
spring.application.name=notificari-service
server.port=8088

# mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/notificari_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=update

# logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.notificari_service=DEBUG

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs

# rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Tracing
management.tracing.sampling.probability=1.0

# DevTools: dezactivam restart automat pentru a evita conflictele cu MapStruct
spring.devtools.restart.enabled=false

# Feign Tracing
spring.cloud.openfeign.micrometer.enabled=true

# Aliniere nivel izolare tranzactii cu teza
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Disable Zipkin span exporting to avoid ConnectException when Zipkin is not running
