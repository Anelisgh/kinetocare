springdoc.api-docs.path=/notificari/v3/api-docs
spring.application.name=notificari-service
server.port=8088

# mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/notificari_service
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Emma19}
spring.jpa.hibernate.ddl-auto=update

# logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.notificari_service=DEBUG

# keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/kinetocare/protocol/openid-connect/certs

# rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}


# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# DevTools: dezactivam restart automat pentru a evita conflictele cu MapStruct
# Dezactivam restartul automat DevTools pentru a evita conflictele cu MapStruct (erori de tip Bean Not Found la pornire)
spring.devtools.restart.enabled=false

# Feign Tracing
spring.cloud.openfeign.micrometer.enabled=true


