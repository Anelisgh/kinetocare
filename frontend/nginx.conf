server {
    listen 80;
    server_name localhost;

    # Servește aplicația React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Redirecționează cererile API către Gateway
    location /api/ {
        proxy_pass http://api-gateway:8081;
        proxy_http_version 1.1;
        
        # Headere necesare pentru conexiunile WebSocket (Chat-ul tău prin STOMP)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Păstrează adresa IP originală a clientului
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}