    container_name: programari-service
    restart: on-failure
    ports:
      - "8085:8085"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - KEYCLOAK_URL=http://keycloak:8080
      - USER_SERVICE_URL=http://user-service:8082
      - PACIENTI_SERVICE_URL=http://pacienti-service:8083
      - TERAPEUTI_SERVICE_URL=http://terapeuti-service:8084
      - SERVICII_SERVICE_URL=http://servicii-service:8086
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
