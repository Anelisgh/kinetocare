services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ./db-init/user_service.sql:/docker-entrypoint-initdb.d/user_service.sql
      - ./db-init/pacienti_service.sql:/docker-entrypoint-initdb.d/pacienti_service.sql
      - ./db-init/terapeuti_service.sql:/docker-entrypoint-initdb.d/terapeuti_service.sql
      - ./db-init/programari_service.sql:/docker-entrypoint-initdb.d/programari_service.sql
      - ./db-init/servicii_service.sql:/docker-entrypoint-initdb.d/servicii_service.sql
      - ./db-init/chat_service.sql:/docker-entrypoint-initdb.d/chat_service.sql
      - ./db-init/notificari_service.sql:/docker-entrypoint-initdb.d/notificari_service.sql
      - mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - kineto-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - kineto-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.4
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - JAVA_OPTS=-Xms256m -Xmx512m
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "8080:8080"
    volumes:
      - ./db-init/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak_data:/opt/keycloak/data
    networks:
      - kineto-network

  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: api-gateway
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - MYSQL_HOST=mysql
      - KEYCLOAK_URL=http://keycloak:8080
      - USER_SERVICE_URL=http://user-service:8082
      - PACIENT_SERVICE_URL=http://pacienti-service:8083
      - TERAPEUTI_SERVICE_URL=http://terapeuti-service:8084
      - PROGRAMARI_SERVICE_URL=http://programari-service:8085
      - SERVICII_SERVICE_URL=http://servicii-service:8086
      - CHAT_SERVICE_URL=http://chat-service:8087
      - NOTIFICARI_SERVICE_URL=http://notificari-service:8088
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - kineto-network

  user-service:
    build:
      context: ./backend/user-service
    container_name: user-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - KEYCLOAK_URL=http://keycloak:8080
      - PACIENTI_SERVICE_URL=http://pacienti-service:8083
      - TERAPEUTI_SERVICE_URL=http://terapeuti-service:8084
      - PROGRAMARI_SERVICE_URL=http://programari-service:8085
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - kineto-network

  pacienti-service:
    build:
      context: ./backend/pacienti-service
    container_name: pacienti-service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - KEYCLOAK_URL=http://keycloak:8080
      - PROGRAMARI_SERVICE_URL=http://programari-service:8085
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - kineto-network

  terapeuti-service:
    build:
      context: ./backend/terapeuti-service
    container_name: terapeuti-service
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - KEYCLOAK_URL=http://keycloak:8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    deploy:
