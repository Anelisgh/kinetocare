      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - kineto-network

  notificari-service:
    build:
      context: ./backend/notificari-service
    container_name: notificari-service
    restart: on-failure
