    networks:
      - kineto-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - api-gateway
    networks:
      - kineto-network

networks:
  kineto-network:
    driver: bridge

volumes:
  mysql_data:
  keycloak_data: